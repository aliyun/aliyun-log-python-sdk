name: Py3-build-test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [3.7, 3.12]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
 
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -V
        python -m pip install --upgrade pip setuptools
        python -m pip install .

    - name: Show dependencies
      run: |
        python -m pip freeze

    - name: Run build tests
      run: |
        python -m pip install pytest
        python -m pytest tests/ci/build-test/

  typing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -V
        python -m pip install --upgrade pip setuptools
        python -m pip install mypy types-requests types-six
        python -m pip install protobuf lz4
        python -m pip install .

    - name: Run stubtest
      run: |
        python tests/ci/run_stubtest.py

    - name: Run public type smoke
      run: |
        python tests/ci/run_public_type_smoke.py
